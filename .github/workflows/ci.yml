name: CI

on:
  push:
    branches: [main]
  pull_request:

# Annule les runs précédents encore en cours sur la même réf.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Couches 1→3 : smoke + unitaire front, unitaire back, routes REST (supertest).
  tests:
    name: Unit & intégration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Client Prisma généré : les tests API en dépendent pour les types
      # (findMany typé, etc.). pnpm ne rejoue pas toujours le postinstall.
      - name: Prisma generate
        run: pnpm --filter api exec prisma generate

      - name: Front (Vitest)
        run: pnpm test:web

      - name: Back unitaire (Jest)
        run: pnpm test:api

      - name: Back routes REST (supertest)
        run: pnpm test:api:e2e

  # Couche 4 : parcours réel dans Chromium (Vite lancé automatiquement par Playwright).
  e2e:
    name: E2E navigateur
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright
        run: pnpm test:e2e

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
