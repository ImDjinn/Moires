# Déploiement production sur un VPS.
# Usage :
#   cp .env.production.example .env.production   (puis remplir les secrets)
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    # Redis n'est pas exposé hors du réseau compose, mais on exige un mot de passe
    # (les tokens ADO y transitent). Doit correspondre à celui de REDIS_URL.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD manquant}"]

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  caddy:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    container_name: moires-web
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      # `default` : pour joindre l'API. `web` : réseau partagé sur lequel l'edge
      # proxy (repo byimad) route themoirai.net / moires.byimad.net vers ce
      # conteneur. Le TLS est terminé par l'edge, ce Caddy n'expose aucun port.
      - default
      - web

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  web:
    external: true
