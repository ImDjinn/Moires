packages:
  - "packages/*"
  - "apps/*"
# Vulnérabilités transitives (pnpm audit) : multer < 2.1.0 (DoS,
# GHSA-xf7r-hgr6-v32p via @nestjs/platform-express), lodash < 4.18.1
# (injection via _.template, via @nestjs/config).
overrides:
  multer: ">=2.1.0"
  lodash: ">=4.18.1"
  # qs <= 6.15.1 : DoS qs.stringify (GHSA-q8mj-m7cp-5q26 via express).
  qs: ">=6.15.2"
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  msgpackr-extract: true
  prisma: true
